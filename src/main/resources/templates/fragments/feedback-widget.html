<!--
Rendered only for a logged-in student who hasn't submitted feedback yet
(see FeedbackPromptAdvice). If the fragment isn't in the page at all,
feedback-widget.js finds no #feedbackModal and quietly does nothing -
that's what keeps the CTA and the auto-popup from ever appearing again
once a student has submitted, and keeps them off admin/guest pages entirely.
-->
<div
    th:fragment="feedback-widget"
    th:if="${feedbackPromptEligible}"
    id="feedbackModal"
    class="modal fade"
    data-bs-backdrop="static"
    data-bs-keyboard="false"
    tabindex="-1"
    aria-labelledby="feedbackModalLabel"
    aria-hidden="true"
    th:attr="data-csrf-token=${_csrf.token},data-csrf-header=${_csrf.headerName}"
>
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4 shadow">
            <!-- Pane 1: rating form. No close button and no backdrop/Esc dismiss by design. -->
            <div class="modal-body p-4 feedback-pane" id="feedbackRatingPane">
                <div class="text-center mb-4">
                    <h5 class="mb-1" id="feedbackModalLabel">
                        How was your experience?
                    </h5>
                    <p class="text-muted mb-0">
                        We'd love to hear your thoughts.
                    </p>
                </div>

                <div
                    class="feedback-rating-options"
                    role="radiogroup"
                    aria-label="Rate your experience"
                >
                    <button
                        type="button"
                        class="feedback-rating-option"
                        th:each="option : ${T(com.keiaa.safepoint.model.enums.FeedbackRating).values()}"
                        th:attr="data-rating=${option.name()}"
                        aria-pressed="false"
                    >
                        <i th:class="'bi ' + ${option.iconClass}"></i>
                        <span th:text="${option.displayName}"></span>
                    </button>
                </div>

                <div class="mt-4">
                    <label for="feedbackComment" class="form-label text-muted"
                        >Please tell us more about your experience.</label
                    >
                    <textarea
                        id="feedbackComment"
                        class="form-control"
                        rows="3"
                        maxlength="1000"
                        placeholder="Optional"
                    ></textarea>
                </div>

                <div
                    id="feedbackError"
                    class="text-danger small mt-3 d-none"
                ></div>

                <div class="d-grid mt-4">
                    <button
                        type="button"
                        id="feedbackSubmitBtn"
                        class="btn btn-primary btn-lg"
                        disabled
                    >
                        Submit
                    </button>
                </div>
            </div>

            <!-- Pane 2: confirmation. Has the only close button in this modal. -->
            <div
                class="modal-body p-4 text-center feedback-pane d-none"
                id="feedbackThanksPane"
            >
                <h5 class="mb-1">
                    Thanks, <span id="feedbackThanksName"></span>
                </h5>
                <p class="text-muted mb-4">Your feedback has been saved!</p>
                <div class="d-grid">
                    <button
                        type="button"
                        class="btn btn-success btn-lg"
                        data-bs-dismiss="modal"
                    >
                        Close
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
