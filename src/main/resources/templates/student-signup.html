<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head(title='Student Signup')}"></head>
<head>
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <!-- Left Branding Section -->
        <div class="auth-branding">
            <div class="auth-logo-container">
                <img src="/img/safepoint.webp" alt="SafePoint Logo" class="auth-logo">
                <div class="auth-brand-text">
                    <p class="welcome">Welcome to</p>
                    <h1 class="brand-name">
                        <span class="safe">Safe</span><span class="point">Point</span>
                    </h1>
                </div>
            </div>
        </div>

        <!-- Right Form Section -->
        <div class="auth-form-section">
            <div class="auth-diagonal-overlay"></div>
            <div class="auth-form-container">
                <!-- Tab Switcher -->
                <div class="auth-tab-switcher">
                    <a href="/student-login" class="auth-tab-btn">Log In</a>
                    <span class="auth-tab-btn active">Sign Up</span>
                </div>

                <!-- Account-level errors only (things that aren't a specific field's fault) -->
                <div th:if="${error}" class="alert alert-danger" role="alert">
                    <span th:text="${error}"></span>
                </div>

                <!-- Signup Form -->
                <form id="signupForm" th:action="@{/student-signup}" th:object="${student}" method="post" novalidate>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="auth-form-floating">
                        <label for="name">Full Name</label>
                        <input type="text" class="form-control" id="name" th:field="*{name}"
                               th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                               placeholder="Enter your full name" required oninput="updateSubmitState()">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>

                    <div class="auth-form-floating">
                        <label for="email">Email</label>
                        <input type="email" class="form-control" id="email" th:field="*{email}"
                               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                               placeholder="Enter your email" required
                               oninput="handleEmailInput()">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        <div class="invalid-feedback" id="emailAvailabilityFeedback"></div>
                    </div>

                    <div class="auth-form-floating">
                        <label for="lrn">LRN</label>
                        <input type="text" class="form-control" id="lrn" th:field="*{lrn}"
                               th:classappend="${#fields.hasErrors('lrn')} ? 'is-invalid'"
                               placeholder="Enter your 12-digit LRN" maxlength="12" pattern="[0-9]{12}" required
                               oninput="handleLrnInput()">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('lrn')}" th:errors="*{lrn}"></div>
                        <div class="invalid-feedback" id="lrnAvailabilityFeedback"></div>
                    </div>

                    <div class="auth-form-floating">
                        <label for="password">Password</label>
                        <input type="password" class="form-control" id="password" th:field="*{password}"
                               th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                               placeholder="Create a password" required oninput="checkPasswordStrength()">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                    </div>

                    <div class="password-strength-container">
                        <div class="password-strength-meter" id="strengthMeter"></div>
                        <div class="auth-form-feedback show" id="strengthFeedback">
                            At least 8 characters, with upper &amp; lower case, a number, and a symbol.
                        </div>
                    </div>

                    <button type="button" class="auth-btn" id="signupSubmitBtn" disabled onclick="validateAndShowModal(event)">Sign Up</button>
                </form>

                <!-- Additional Links -->
                <div class="auth-additional-links">
                    <a href="/student-login">Already have an account? Log In</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Terms & Privacy Modal -->
    <div th:replace="~{fragments/terms-privacy-modal :: terms-privacy-modal}"></div>

    <div th:replace="~{fragments/common :: scripts}"></div>

    <script>
    const PASSWORD_REGEX = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,}$/;

    // null = not checked yet, true = available/valid, false = taken/invalid
    let emailAvailable = null;
    let lrnAvailable = null;
    let passwordValid = false;

    function debounce(fn, delay) {
        let timer;
        return function (...args) {
            clearTimeout(timer);
            timer = setTimeout(() => fn.apply(this, args), delay);
        };
    }

    function updateSubmitState() {
        const nameField = document.getElementById('name');
        const emailField = document.getElementById('email');
        const lrnField = document.getElementById('lrn');
        const submitBtn = document.getElementById('signupSubmitBtn');

        const nameValid = nameField.checkValidity();
        const emailFormatValid = emailField.checkValidity();
        const lrnFormatValid = lrnField.checkValidity();

        const allGood =
            nameValid &&
            emailFormatValid && emailAvailable !== false &&
            lrnFormatValid && lrnAvailable !== false &&
            passwordValid;

        submitBtn.disabled = !allGood;
    }

    const requestEmailCheck = debounce(async function () {
        const emailField = document.getElementById('email');
        const feedback = document.getElementById('emailAvailabilityFeedback');
        const email = emailField.value.trim();

        if (!emailField.checkValidity() || email.length === 0) {
            emailAvailable = null;
            emailField.classList.remove('is-invalid', 'is-valid');
            feedback.textContent = '';
            updateSubmitState();
            return;
        }

        try {
            const response = await fetch('/student-signup/check-email?email=' + encodeURIComponent(email));
            if (!response.ok) {
                emailAvailable = null; // fail open - the server still enforces this on submit
                updateSubmitState();
                return;
            }
            const data = await response.json();
            emailAvailable = data.available;
            emailField.classList.toggle('is-invalid', !emailAvailable);
            emailField.classList.toggle('is-valid', emailAvailable);
            feedback.textContent = emailAvailable ? '' : 'An account with this email already exists.';
        } catch (e) {
            emailAvailable = null;
        }
        updateSubmitState();
    }, 500);

    const requestLrnCheck = debounce(async function () {
        const lrnField = document.getElementById('lrn');
        const feedback = document.getElementById('lrnAvailabilityFeedback');
        const lrn = lrnField.value.trim();

        if (!lrnField.checkValidity() || lrn.length === 0) {
            lrnAvailable = null;
            lrnField.classList.remove('is-invalid', 'is-valid');
            feedback.textContent = '';
            updateSubmitState();
            return;
        }

        try {
            const response = await fetch('/student-signup/check-lrn?lrn=' + encodeURIComponent(lrn));
            if (!response.ok) {
                lrnAvailable = null;
                updateSubmitState();
                return;
            }
            const data = await response.json();
            lrnAvailable = data.available;
            lrnField.classList.toggle('is-invalid', !lrnAvailable);
            lrnField.classList.toggle('is-valid', lrnAvailable);
            feedback.textContent = lrnAvailable ? '' : 'An account with this LRN already exists.';
        } catch (e) {
            lrnAvailable = null;
        }
        updateSubmitState();
    }, 500);

    function handleEmailInput() {
        emailAvailable = null; // stale until the debounced check resolves
        requestEmailCheck();
        updateSubmitState();
    }

    function handleLrnInput() {
        lrnAvailable = null;
        requestLrnCheck();
        updateSubmitState();
    }

    function checkPasswordStrength() {
        const password = document.getElementById('password').value;
        const passwordField = document.getElementById('password');
        const strengthMeter = document.getElementById('strengthMeter');
        const strengthFeedback = document.getElementById('strengthFeedback');

        let strength = 0;
        if (password.length >= 8) strength += 25;
        if (password.length >= 12) strength += 15;
        if (/[a-z]/.test(password)) strength += 15;
        if (/[A-Z]/.test(password)) strength += 15;
        if (/[0-9]/.test(password)) strength += 15;
        if (/[^a-zA-Z0-9]/.test(password)) strength += 15;

        strengthMeter.className = 'password-strength-meter';
        if (strength === 0) {
            strengthFeedback.textContent = 'At least 8 characters, with upper & lower case, a number, and a symbol.';
        } else if (strength <= 40) {
            strengthMeter.classList.add('password-strength-weak');
            strengthFeedback.textContent = 'Weak - keep going';
        } else if (strength <= 70) {
            strengthMeter.classList.add('password-strength-fair');
            strengthFeedback.textContent = 'Fair - almost there';
        } else if (strength < 100) {
            strengthMeter.classList.add('password-strength-good');
            strengthFeedback.textContent = 'Good';
        } else {
            strengthMeter.classList.add('password-strength-strong');
            strengthFeedback.textContent = 'Strong password';
        }

        passwordValid = PASSWORD_REGEX.test(password);
        passwordField.classList.toggle('is-invalid', password.length > 0 && !passwordValid);
        updateSubmitState();
    }

    function validateAndShowModal(event) {
        const form = document.getElementById('signupForm');
        if (form.checkValidity()) {
            const modal = new bootstrap.Modal(document.getElementById('termsPrivacyModal'));
            modal.show();
        } else {
            form.reportValidity();
        }
    }

    const agreeCheckbox = document.getElementById('agreeTerms');
    const proceedBtn = document.getElementById('proceedSignup');
    const modal = document.getElementById('termsPrivacyModal');

    agreeCheckbox.addEventListener('change', function () {
        proceedBtn.disabled = !this.checked;
    });

    proceedBtn.addEventListener('click', function () {
        document.getElementById('signupForm').submit();
    });

    modal.addEventListener('hidden.bs.modal', function () {
        agreeCheckbox.checked = false;
        proceedBtn.disabled = true;
    });
    </script>
</body>
</html>
