# ===================================================================
# PROD PROFILE - PostgreSQL
# Safe to commit: no secrets are hardcoded here, they're pulled from
# environment variables at startup. Set these on the server (e.g. in the
# systemd unit's [Service] block via Environment= lines, or an EnvironmentFile):
#
#   DB_URL=jdbc:postgresql://localhost:5432/safepoint
#   DB_USERNAME=safepoint
#   DB_PASSWORD=<the real password>
#
# Activate this profile by setting SPRING_PROFILES_ACTIVE=prod in the same
# systemd unit.
# ===================================================================

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Quieter logs in production.
spring.jpa.show-sql=false
