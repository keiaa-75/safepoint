# ===================================================================
# DEV PROFILE - file-based H2, stored under ./data
# Safe to commit: no real credentials. Data persists across restarts this
# time (unlike the in-memory setup), so the data/ folder itself should stay
# gitignored - it's local state, not something to commit.
# ===================================================================

spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:file:./data/safepoint
spring.datasource.username=sa
spring.datasource.password=
